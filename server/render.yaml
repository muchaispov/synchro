services:
  - type: web
    name: synchro
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn run:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120"
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: synchro-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
      - key: PLATFORM_FEE_PERCENT
        value: "2.5"
      # Set these manually in the Render dashboard:
      # MPESA_CONSUMER_KEY, MPESA_CONSUMER_SECRET, MPESA_SHORTCODE
      # MPESA_PASSKEY, MPESA_CALLBACK_URL, MPESA_INITIATOR_NAME
      # MPESA_SECURITY_CREDENTIAL, MPESA_TIMEOUT_URL, MPESA_RESULT_URL
      # PAYSTACK_SECRET_KEY, PAYSTACK_PUBLIC_KEY
      # AT_USERNAME, AT_API_KEY, AT_SENDER_ID
      # ADMIN_SEED_SECRET, FRONTEND_URL

databases:
  - name: synchro-db
    databaseName: synchro
    user: synchro
    plan: free